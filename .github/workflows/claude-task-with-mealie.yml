name: Claude Task (with Mealie)

on:
  workflow_call:
    inputs:
      prompt:
        description: Prompt for Claude. Leave empty for interactive tag mode.
        required: false
        type: string
        default: ''
      allowed-tools:
        description: Comma-separated allowedTools list passed to Claude Code.
        required: true
        type: string
      model:
        description: Claude model id.
        required: false
        type: string
        default: claude-sonnet-4-6
      auto-pr:
        description: Open the PR and dispatch the review after Claude finishes.
        required: false
        type: boolean
        default: false
    secrets:
      claude-oauth-token:
        required: true

permissions: {}

jobs:
  resolve-spec:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      tag: ${{ steps.read.outputs.tag }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - id: read
        run: echo "tag=$(./scripts/resolve-spec-tag)" >> "$GITHUB_OUTPUT"

  live:
    needs: resolve-spec
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: write
    services:
      mealie:
        image: ghcr.io/mealie-recipes/mealie:${{ needs.resolve-spec.outputs.tag }}
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -f http://localhost:9000/api/app/about"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 60
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Mint Mealie admin token
        uses: ./.github/actions/mealie-token
        with:
          base-url: http://localhost:9000

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@d5726de019ec4498aa667642bc3a80fca83aa102 # v1.0.148
        env:
          APPEND_SYSTEM_PROMPT: "${{ inputs.auto-pr && format('Before you push the branch for this issue, write the conventional-commit PR title (single line, no surrounding quotes or markdown) to {0}/pr-title.txt and the full PR body markdown to {0}/pr-body.md. The PR body must follow the structure CLAUDE.md requires: link to the task file by slug if one exists, a \"Tools added\" or \"Changes\" bullet list with name and one line each, a \"How tested\" block with the tail of `pytest` (tee output to {0}/pytest.log) and `pytest -m live` (tee output to {0}/pytest-live.log) so the tails are real not paraphrased, and a \"Risks\" block (even if it says \"none\"). Skip these files if you produced no branch.', runner.temp) || '' }}"
        with:
          claude_code_oauth_token: ${{ secrets.claude-oauth-token }}
          prompt: ${{ inputs.prompt }}
          label_trigger: ${{ inputs.auto-pr && 'claude-auto-pr' || 'claude' }}
          track_progress: true
          use_commit_signing: true
          # Claude's sub-token stays read on actions; the post-step dispatches via the job-level actions: write.
          additional_permissions: |
            actions: read
          claude_args: |
            --model ${{ inputs.model }}
            --allowedTools "${{ inputs.allowed-tools }}"

      - name: Flag missing branch on auto-pr
        if: inputs.auto-pr && steps.claude.outputs.branch_name == ''
        run: |
          echo "::error::auto-pr requested but Claude produced no branch. The action likely found no matching trigger (check label_trigger vs the firing label) or exited before pushing. See the Run Claude Code step logs."
          exit 1

      - name: Open PR and dispatch review
        if: inputs.auto-pr && steps.claude.outputs.branch_name != ''
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.claude.outputs.branch_name }}
          BASE: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          title_file="$RUNNER_TEMP/pr-title.txt"
          body_file="$RUNNER_TEMP/pr-body.md"
          if [[ ! -s "$title_file" || ! -s "$body_file" ]]; then
            echo "::error::Claude did not produce $title_file and $body_file; cannot open PR."
            exit 1
          fi
          title=$(head -n1 "$title_file" | tr -d '\r' | sed 's/^[[:space:]]\+//;s/[[:space:]]\+$//')
          if [[ -z "$title" ]]; then
            echo "::error::pr-title.txt first line is empty after trimming whitespace."
            exit 1
          fi
          pr_url=$(gh pr create \
            --base "$BASE" \
            --head "$BRANCH" \
            --title "$title" \
            --body-file "$body_file")
          pr_number=$(gh pr view "$pr_url" --json number -q .number)
          echo "Opened $pr_url"
          gh workflow run claude-pr-review.yml \
            -F pull-request-number="$pr_number"
