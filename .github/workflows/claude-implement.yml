name: Claude Implement

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      prompt:
        description: Task for Claude when triggered manually.
        required: true
        type: string

concurrency:
  group: claude-implement-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  coworker:
    if: >
      github.actor == github.repository_owner &&
      (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (
          (github.event.action == 'labeled' && github.event.label.name == 'claude') ||
          (github.event.action == 'opened' &&
            (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
        ))
      )
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    uses: ./.github/workflows/claude-agent-run.yml
    with:
      prompt: ${{ inputs.prompt || '' }}
      model: claude-opus-4-8
      allowed-tools: Bash,Edit,Read,Write,Glob,Grep,WebFetch,WebSearch,mcp__github_inline_comment__create_inline_comment,mcp__github_ci__get_ci_status,mcp__github_ci__get_workflow_run_details,mcp__github_ci__download_job_log
    secrets:
      claude-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
