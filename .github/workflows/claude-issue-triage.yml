name: Claude Issue Triage

on:
  issues:
    types: [opened]

concurrency:
  group: claude-issue-triage-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions: {}

jobs:
  triage:
    if: github.actor == github.repository_owner && toJSON(github.event.issue.labels) == '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run Claude Code
        uses: anthropics/claude-code-action@0f97b95b6536c26e5f6bd90faec370d41695beca # v1.0.144
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: "/triage-issue REPO: ${{ github.repository }} ISSUE_NUMBER: ${{ github.event.issue.number }} TITLE: ${{ github.event.issue.title }} AUTHOR: ${{ github.event.issue.user.login }}"
          claude_args: |
            --model claude-sonnet-4-6
