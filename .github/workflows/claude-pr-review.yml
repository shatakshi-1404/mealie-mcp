name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - '**.md'
  workflow_dispatch:
    inputs:
      pull-request-number:
        description: PR number to review.
        required: true
        type: string
      model:
        description: Claude model to use for the review.
        required: false
        default: claude-sonnet-4-6
        type: choice
        options:
          - claude-sonnet-4-6
          - claude-opus-4-8

concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number || inputs.pull-request-number }}
  cancel-in-progress: true

permissions: {}

jobs:
  review:
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.user.login == github.repository_owner) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/pull/{0}/head', inputs.pull-request-number) || github.ref }}

      - name: Run Claude Code
        env:
          # gh CLI fallback for the workflow_dispatch path: claude-code-action runs in agent
          # mode there, with no sticky tracking comment, so Claude posts the summary itself.
          GH_TOKEN: ${{ github.token }}
        uses: anthropics/claude-code-action@d5726de019ec4498aa667642bc3a80fca83aa102 # v1.0.148
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Dispatched runs come from claude-task-with-mealie.yml via `gh workflow run`, which
          # GitHub records as github-actions[bot]. The pull_request path stays bot-locked.
          allowed_bots: ${{ github.event_name == 'workflow_dispatch' && 'github-actions[bot]' || '' }}
          track_progress: ${{ github.event_name == 'pull_request' }}
          use_commit_signing: true
          use_sticky_comment: ${{ github.event_name == 'pull_request' }}
          prompt: "/review-pr REPO: ${{ github.repository }} PR_NUMBER: ${{ github.event.pull_request.number || inputs.pull-request-number }}"
          claude_args: |
            --model ${{ inputs.model || 'claude-sonnet-4-6' }}
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Write"
