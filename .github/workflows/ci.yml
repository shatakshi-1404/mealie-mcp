name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  definition-of-ready:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Read Python version
        id: pyver
        run: echo "version=$(cat .python-version)" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install ${{ steps.pyver.outputs.version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: ruff format
        run: uv run ruff format --check .

      - name: ruff check
        run: uv run ruff check .

      - name: mypy
        run: uv run mypy src

      - name: pytest (with coverage report)
        run: uv run pytest

      - name: bandit
        run: uv run bandit -r src -c pyproject.toml

      - name: pip-audit
        run: uv run pip-audit
