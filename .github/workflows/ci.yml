name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-spec:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      tag: ${{ steps.read.outputs.tag }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - id: read
        run: echo "tag=$(./scripts/resolve-spec-tag)" >> "$GITHUB_OUTPUT"

  definition-of-ready:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Read Python version
        id: pyver
        run: echo "version=$(cat .python-version)" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install ${{ steps.pyver.outputs.version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: ruff format
        run: uv run ruff format --check .

      - name: ruff check
        run: uv run ruff check .

      - name: mypy
        run: uv run mypy src

      - name: pytest (with coverage report)
        run: uv run pytest

      - name: bandit
        run: uv run bandit -r src -c pyproject.toml

      - name: pip-audit
        run: uv run pip-audit

  live-tests:
    needs: resolve-spec
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mealie:
        image: ghcr.io/mealie-recipes/mealie:${{ needs.resolve-spec.outputs.tag }}
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -f http://localhost:9000/api/app/about"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Read Python version
        id: pyver
        run: echo "version=$(cat .python-version)" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install ${{ steps.pyver.outputs.version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Mint Mealie admin token
        uses: ./.github/actions/mealie-token
        with:
          base-url: http://localhost:9000

      - name: pytest live
        run: uv run pytest -m live
